name: Container
on: push

jobs:
  voicevox-docker:
    runs-on: ubuntu-latest
    container:
      image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
      ports:
        - 50021:50021
    steps:
      - name: Log container info
        run: |
          echo "Running in container: $(hostname)"
          echo "Container IP address: $(hostname -I)"
