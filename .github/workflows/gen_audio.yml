name: Container
on: push

jobs:
  voicevox-docker:
    runs-on: ubuntu-20.04
    container:
      image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
      ports:
        - 50021:50021
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install python
        run: |
          apt update
          apt install ffmpeg curl python3 python3-pip -y
          pip3 install requests pydub natsort
      - name: Generate audio
         run: |
          echo こんにちは>test.txt
          curl -s -X POST "localhost:50021/audio_query?speaker=1" --get --data-urlencode text@text.txt
          #sapporo
          #python3 ./weather.py 016010
          ls -l
