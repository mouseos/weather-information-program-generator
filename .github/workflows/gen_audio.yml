name: Gen audio

on:
  schedule:
    - cron: "40 * * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    name: Generate Audio
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Docker image
        run: docker pull voicevox/voicevox_engine:cpu-ubuntu20.04-latest

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          cache: 'pip'
          check-latest: true

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg curl
          pip --disable-pip-version-check install -r requirements.txt

      - name: Run Docker container
        run: docker run --rm -p '127.0.0.1:50021:50021' voicevox/voicevox_engine:cpu-ubuntu20.04-latest & sleep 20; python3 weather.py 016010

      - name: Move files to audio directory
        run: mv -f **.wav audio/

      - name: Push changes to repo
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update audio files"
          branch: main
